<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E131F" />
      <stop offset="100%" stop-color="#05070A" />
    </linearGradient>

    <!-- Accent Gradient (Neon Green) -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00FF88" />
      <stop offset="100%" stop-color="#00E676" />
    </linearGradient>

    <!-- Secondary Accent (Cyan) -->
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#0088FF" />
    </linearGradient>

    <!-- Avatar Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Circle Background -->
  <circle cx="100" cy="100" r="96" fill="url(#bg-grad)" stroke="#1E293B" stroke-width="2" />

  <!-- Code/Tech grid details in background -->
  <g opacity="0.15">
    <line x1="40" y1="100" x2="160" y2="100" stroke="#00FF88" stroke-width="1" stroke-dasharray="4,4" />
    <line x1="100" y1="40" x2="100" y2="160" stroke="#00FF88" stroke-width="1" stroke-dasharray="4,4" />
    <circle cx="100" cy="100" r="60" fill="none" stroke="#00FF88" stroke-width="1" stroke-dasharray="5,10" />
    <circle cx="100" cy="100" r="45" fill="none" stroke="#00D2FF" stroke-width="1" stroke-dasharray="3,6" />
  </g>

  <!-- Outer Neon Rings -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.3" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#cyan-grad)" stroke-width="1" opacity="0.2" stroke-dasharray="20 10 5 10" />

  <!-- The Developer Character (Stylized Silhouette) -->
  <g id="character">
    <!-- Shadow/Glow behind character -->
    <path d="M60 160 C 60 130, 80 120, 100 120 C 120 120, 140 130, 140 160 Z" fill="#00FF88" opacity="0.05" filter="url(#neon-glow)" />

    <!-- Hoodie/Shoulders -->
    <path d="M45 170 C 45 135, 70 125, 100 125 C 130 125, 155 135, 155 170 C 155 172, 153 175, 150 175 H 50 C 47 175, 45 172, 45 170 Z" fill="#131B2E" stroke="#1E293B" stroke-width="2" />
    
    <!-- Inner Hoodie/Collar -->
    <path d="M75 135 C 75 135, 100 155, 100 155 C 100 155, 125 135, 125 135" fill="none" stroke="url(#accent-grad)" stroke-width="2.5" stroke-linecap="round" />

    <!-- Face / Head -->
    <circle cx="100" cy="90" r="28" fill="#1E293B" stroke="#334155" stroke-width="2" />

    <!-- Cyber Hair/Beanie -->
    <path d="M72 90 C 72 70, 85 62, 100 62 C 115 62, 128 70, 128 90 C 128 90, 120 85, 100 85 C 80 85, 72 90, 72 90 Z" fill="url(#accent-grad)" filter="url(#neon-glow)" />

    <!-- Cyber Glasses/Visor (representing tech/sysadmin focus) -->
    <path d="M78 88 H 122 V 96 C 122 98, 120 100, 117 100 H 83 C 80 100, 78 98, 78 96 Z" fill="rgba(0, 255, 136, 0.15)" stroke="url(#accent-grad)" stroke-width="2" filter="url(#neon-glow)" />
    <!-- Visor reflections/details -->
    <line x1="83" y1="92" x2="95" y2="92" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
    <circle cx="112" cy="94" r="1.5" fill="#00D2FF" />

    <!-- Cool headphones (DevOps / Focus vibe) -->
    <rect x="66" y="80" rx="3" ry="3" width="8" height="20" fill="url(#cyan-grad)" />
    <rect x="126" y="80" rx="3" ry="3" width="8" height="20" fill="url(#cyan-grad)" />
    <path d="M70 80 C 70 58, 130 58, 130 80" fill="none" stroke="#1E293B" stroke-width="3.5" />
    <path d="M70 80 C 70 58, 130 58, 130 80" fill="none" stroke="url(#cyan-grad)" stroke-width="1.5" opacity="0.6" />
  </g>

  <!-- Glowing binary code/nodes surrounding character -->
  <g opacity="0.8" filter="url(#neon-glow)" font-family="monospace" font-size="10" font-weight="bold">
    <text x="25" y="65" fill="#00FF88" opacity="0.7">&lt;/&gt;</text>
    <text x="155" y="65" fill="#00D2FF" opacity="0.7">sh</text>
    <text x="22" y="130" fill="#00FF88" opacity="0.6">1</text>
    <text x="168" y="130" fill="#00D2FF" opacity="0.6">0</text>
    <!-- Code nodes -->
    <circle cx="35" cy="95" r="3" fill="#00FF88" />
    <line x1="35" y1="95" x2="25" y2="105" stroke="#00FF88" stroke-width="1" />
    <circle cx="25" cy="105" r="1.5" fill="#00FF88" />

    <circle cx="165" cy="95" r="3" fill="#00D2FF" />
    <line x1="165" y1="95" x2="175" y2="105" stroke="#00D2FF" stroke-width="1" />
    <circle cx="175" cy="105" r="1.5" fill="#00D2FF" />
  </g>
</svg>
